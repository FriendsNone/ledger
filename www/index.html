<style>
  :root {
    /* ---- COLOR: surfaces ---- */
    --paper: #f4f1ea; --paper-2: #ebe6db; --card: #fbfaf6;
    /* ---- COLOR: text ---- */
    --ink: #221f1a; --ink-soft: #6b6457; --ink-faint: #736b5a;
    /* ---- COLOR: lines ---- */
    --line: #ddd6c7; --line-strong: #cfc6b3;
    --rule: rgba(168,158,138,.10);
    /* ---- COLOR: semantic money ---- */
    --income: #2f6b4f; --income-soft: #e4efe7;
    --expense: #a8442b; --expense-soft: #f5e4dd;
    --amber: #8a6410; --amber-soft: #f6ecd5;
    /* ---- COLOR: action ---- */
    --accent: #1a1814; --accent-ink: #f4f1ea; --on-fill: #fff;
    --danger: #a8442b; --danger-soft: rgba(190,70,55,.16);
    --hover: rgba(120,110,90,.09);
    --ring: rgba(120,110,90,.14); --ring-danger: rgba(190,70,55,.16);
    /* ---- ELEVATION ---- */
    --shadow-sm: 0 1px 2px rgba(40,34,22,.06);
    --shadow-md: 0 1px 2px rgba(40,34,22,.05), 0 8px 24px rgba(40,34,22,.06);
    --shadow-lg: 0 6px 18px rgba(40,34,22,.14), 0 18px 44px rgba(40,34,22,.16);
    --shadow: var(--shadow-md); /* legacy alias */
    --scrim: rgba(40,34,22,.38);
    /* ---- TYPE SCALE ---- */
    --fs-xs: 11px;    /* micro labels, badges */
    --fs-sm: 12.5px;  /* secondary / meta text */
    --fs-md: 14px;    /* body default */
    --fs-lg: 16px;    /* emphasis, row values */
    --fs-xl: 20px;    /* section figures */
    --fs-display-sm: 26px;   /* card figures */
    --fs-display-md: 32px;   /* page titles in the hero (Help, Settings) */
    --fs-display: 42px;      /* the hero net-worth figure */
    /* weights — ONLY 400/600/700 are embedded; never use 500 or 800 */
    --fw-regular: 400; --fw-semi: 600; --fw-bold: 700;
    /* ---- RADIUS ---- */
    --r-xs: 5px; --r-sm: 8px; --r-md: 10px; --r-lg: 14px;
    --r-pill: 999px; --r-circle: 50%;
    --radius: var(--r-lg); /* legacy alias */
    /* ---- SPACE ---- */
    --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px; --s-5: 24px;
    /* ---- CONTROL HEIGHTS — every interactive control snaps to one of these.
       Never let a height fall out of padding math; declare it. ---- */
    --ctl-xs: 30px;   /* icon/text actions inside a row: .mini .del .act */
    --ctl-sm: 34px;   /* compact controls: filter rows */
    --ctl-md: 44px;   /* default: form fields, buttons, segmented controls */
    /* ---- MOTION ---- */
    --t-fast: 120ms; --t-base: 180ms; --t-slow: 300ms;
    --ease: cubic-bezier(.32, .72, 0, 1);
  }
  [data-theme="dark"] {
    --paper: #17150f; --paper-2: #221f18; --card: #1f1c15;
    --ink: #ece6d8; --ink-soft: #a89f8a; --ink-faint: #8f876f;
    --line: #2e2a20; --line-strong: #403a2d;
    --rule: rgba(120,112,92,.10);
    --income: #6cc18f; --income-soft: #1d2f23;
    --expense: #e08566; --expense-soft: #361f17;
    --amber: #d9aa46; --amber-soft: #2e2613;
    --accent: #ece6d8; --accent-ink: #17150f; --on-fill: #17150f;
    --danger: #e08566; --danger-soft: rgba(224,133,102,.18);
    --hover: rgba(236,230,216,.06);
    --ring: rgba(236,230,216,.12); --ring-danger: rgba(224,133,102,.20);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.28);
    --shadow-md: 0 1px 2px rgba(0,0,0,.3), 0 10px 28px rgba(0,0,0,.35);
    --shadow-lg: 0 6px 18px rgba(0,0,0,.4), 0 20px 48px rgba(0,0,0,.5);
    --shadow: var(--shadow-md);
    --scrim: rgba(0,0,0,.55);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; } body { min-height: 100%; }
  body {
    font-family: 'Hanken Grotesk', sans-serif; background: var(--paper);
    background-image: repeating-linear-gradient(transparent, transparent 31px, var(--rule) 31px, var(--rule) 32px);
    color: var(--ink); -webkit-font-smoothing: antialiased; line-height: 1.45;
    padding: 26px 18px 70px; transition: background-color var(--t-base), color var(--t-base); overflow-x: hidden;
  }
  .wrap { max-width: 940px; margin: 0 auto; }
  .num { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; letter-spacing: -.02em; }
  .pos { color: var(--income); } .neg { color: var(--expense); } .neu { color: var(--ink-soft); }

  header { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
  .brand { display: flex; align-items: center; gap: 11px; }
  .mark { width: 38px; height: 38px; border-radius: var(--r-sm); flex: none; background: var(--accent); color: var(--accent-ink); display: grid; place-items: center; font-family: 'Fraunces', serif; font-weight: var(--fw-semi); font-size: var(--fs-xl); }
  .brand h1 { font-family: 'Fraunces', serif; font-weight: var(--fw-semi); font-size: var(--fs-display-sm); letter-spacing: -.01em; }
  .brand p { color: var(--ink-soft); font-size: var(--fs-sm); margin-top: -2px; }
  .tools { display: flex; align-items: center; gap: 8px; }

  nav.tabs { background: var(--paper-2); padding: 4px; border-radius: var(--r-md); margin-bottom: 16px; }
  .tabs-track { display: flex; gap: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  nav.tabs button { flex: 1; min-width: max-content; border: 0; background: transparent; padding: 9px 14px; border-radius: var(--r-sm); cursor: pointer; font-family: inherit; font-size: var(--fs-md); font-weight: var(--fw-semi); color: var(--ink-soft); transition: var(--t-fast); white-space: nowrap; }
  /* nav.tabs is structurally a .seg (trough + buttons); it takes the RAISED active tone. */
  nav.tabs button.on { background: var(--card); color: var(--ink); box-shadow: var(--shadow-sm); }

  .hero { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--shadow); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
  .hero .label { font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: .14em; color: var(--ink-faint); margin-bottom: 6px; }
  .hero .balance { font-size: var(--fs-display); font-weight: var(--fw-semi); line-height: 1; }
  .hero .csub { font-size: var(--fs-md); color: var(--ink-soft); margin-top: 8px; }
  .pills { display: flex; gap: 22px; flex-wrap: wrap; }
  .pill .label { font-size: var(--fs-xs); } .pill .v { font-size: var(--fs-xl); font-weight: var(--fw-semi); }

  .cols { display: grid; grid-template-columns: 360px 1fr; gap: 16px; align-items: start; }
  .cols > div { min-width: 0; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  @media (max-width: 780px) { .cols { grid-template-columns: 1fr; } }
  @media (min-width: 781px) { .cols > div:first-child { position: sticky; top: 16px; max-height: calc(100vh - 32px); overflow-y: auto; overflow-x: hidden; } }

  /* ===== BUTTONS =====
     TWO SURFACE ROLES — do not invent a third:
       FILLED   (no border)  .btn / .btn.sec / .btn.danger   — a fill carries the weight
       OUTLINED (1px border) .icon-btn / .act                — always background: var(--card)
     --card is the "raised surface" token; an interactive control is a raised thing.
     ===== one primitive, three tones, two sizes =====
     .btn              full-width primary (accent fill)
     .btn.sec          secondary (quiet fill)
     .btn.danger       destructive
     .btn.btn-sm       compact, auto-width
     .icon-btn         square, bordered, icon-only (header tools)
     .mini / .del      borderless icon action inside a row (.del = destructive) */
  /* a class that sets `display` beats the UA rule for [hidden] — this is the fix.
     (.icon-btn set display:inline-flex, so the hidden sync button still rendered.) */
  [hidden] { display: none !important; }
  .btn { width: 100%; height: var(--ctl-md); border: 0; border-radius: var(--r-md); padding: 0 var(--s-3); cursor: pointer; font-family: inherit; font-size: var(--fs-lg); font-weight: var(--fw-bold); color: var(--accent-ink); background: var(--accent); display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: opacity var(--t-fast), transform var(--t-fast), background var(--t-fast), color var(--t-fast); }

  .btn:active { transform: scale(.985); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn.sec { background: var(--paper-2); color: var(--ink); }
  .btn.sec:hover { background: var(--hover); opacity: 1; }
  .btn.danger { background: var(--danger); color: var(--on-fill); }
  .btn.btn-sm { width: auto; height: var(--ctl-sm); padding: 0 var(--s-3); font-size: var(--fs-md); font-weight: var(--fw-semi); border-radius: var(--r-sm); }
  .btn .ic { width: 17px; height: 17px; margin: 0; }
  .icon-btn { width: var(--ctl-md); height: var(--ctl-md); flex: none; color: var(--ink); border: 1px solid var(--line-strong); background: var(--card); border-radius: var(--r-sm); padding: 0; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-family: inherit; transition: border-color var(--t-fast), background var(--t-fast), color var(--t-fast); }
  .icon-btn:hover { border-color: var(--ink-soft); background: var(--hover); }
  .icon-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .icon-btn.on { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

  .mini, .del { border: 0; background: transparent; color: var(--ink-faint); cursor: pointer; line-height: 0; padding: 0; width: var(--ctl-xs); height: var(--ctl-xs); border-radius: var(--r-sm); display: inline-flex; align-items: center; justify-content: center; font-family: inherit; transition: background var(--t-fast), color var(--t-fast); }
  .mini:hover { background: var(--hover); color: var(--ink); }
  .del:hover { background: var(--danger-soft); color: var(--danger); }
  .mini:focus-visible, .del:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  /* .act — a TEXT action inside a row or toolbar (the "Log" / "Settle" button).
     Full-contrast --ink text: stays readable in dark mode, unlike a muted variant.
     .act.primary  filled (accent)
     .act.pill     pill-shaped, for compound chips with a name + amount */
  .act { height: var(--ctl-xs); border: 1px solid var(--line-strong); background: var(--card); color: var(--ink); border-radius: var(--r-sm); padding: 0 11px; font-family: inherit; font-size: var(--fs-sm); font-weight: var(--fw-semi); cursor: pointer; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px; transition: border-color var(--t-fast), background var(--t-fast), color var(--t-fast); }

  /* .stack — a vertical group with ONE uniform gap. The parent owns the rhythm;
     children must not add their own margins. Fixes gaps that ran 12/14/8/8px. */
  .vstack { display: flex; flex-direction: column; gap: var(--s-2); margin-bottom: var(--s-3); }

  /* filter panel (Track) — restored: the toggle merge had destroyed these */
  .filt-more { margin: 0; display: flex; flex-direction: column; gap: var(--s-2); }
  .filt-more .inp, .filt-more input { height: var(--ctl-sm); font-size: var(--fs-sm); padding: 0 9px; border-radius: var(--r-sm); }

  /* ===== SEGMENTED CONTROL — the single toggle primitive =====
     .seg            equal-width columns (2 by default, .three for 3)
     .seg.scroll     horizontal scroller (many options, e.g. period pickers)
     button.on       active — ALWAYS via the .on class, never attribute selectors
     .tone-income / .tone-expense / .tone-neutral  optional semantic active colour */
  .seg { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-1); background: var(--paper-2); padding: var(--s-1); border-radius: var(--r-md); margin-bottom: var(--s-3); }

  /* .seg.raised — active reads as a LIFTED chip instead of a filled pill.

     The filled default is for SELECTION ("what did I pick"), which is a deliberate act.

  .seg.raised button.on { background: var(--card); color: var(--ink); box-shadow: var(--shadow-sm); }

  .seg button.on.tone-neutral { background: var(--accent); color: var(--accent-ink); }

  function renderHelp() {
    var hero = '<div class="hero"><div><div class="label">Ledger</div><div class="big">Help &amp; tips</div><div class="csub">How it works, FAQ &amp; reference</div></div></div>';
    var sidebar = card("Welcome", "What this is", '<div class="help-b">' + "<p>Ledger is a private money tracker. Everything you enter stays on this device — it's saved locally and never sent to a server or an account.</p><p>Add your accounts, log what comes in and goes out, keep tabs on loans, set reusable templates, and watch the trends.</p>" + '</div>');
    var body = "";
    body += card("Logging entries", "Income, expense, transfer", '<div class="help-b">' + "<p>Use the <strong>Track</strong> tab to add an entry, or tap the <strong>+</strong> button (bottom-right on mobile) to log from anywhere. Entries come in three kinds: income (money in), expense (money out), and a transfer that moves money between your own accounts.</p><p>You lead with the amount, then where it came from or went, and the account it touched. <strong>Where</strong> is just a label — a shop, a person, a source — and it remembers what you've typed before.</p>" + '</div>', { collapsible: true, key: "help-log" });
    body += card("Accounts &amp; transfers", "Where your money sits", '<div class="help-b">' + "<p>Accounts hold your balances. Each starts from an opening balance and shifts as you log activity. A balance shows in plain ink, turning red only if it goes negative.</p><p>A <strong>transfer</strong> moves money from one account to another and can carry a fee — the fee counts as an expense, the amount moved doesn't.</p>" + '</div>', { collapsible: true, key: "help-acct" });
    body += card("Templates &amp; Upcoming", "Reusable, one-tap entries", '<div class="help-b">' + "<p>Templates are one-tap entries for things that repeat — rent, a subscription, a paycheck. Give one an expected day of the month and it shows under <strong>Upcoming</strong> as its due date nears.</p><p>Leave the amount <strong>blank</strong> to make it variable — you'll type the real figure each time you log it, handy for subscriptions whose price shifts with taxes and fees. Once logged for the month, a template is marked 'logged' and rolls forward to next month.</p><p>Upcoming shows only what's due in the next couple of weeks, plus anything overdue.</p>" + '</div>', { collapsible: true, key: "help-tpl" });
    body += card("People &amp; who owes whom", "Naming someone on an entry", '<div class="help-b">' + "<p>Ledger doesn't keep a separate list of loans. Instead, a debt rides along on the <strong>real transaction</strong> that created it, so you never lose the merchant or the moment it happened.</p><p>When you add an expense or income, there's an optional line: <strong>Involves someone else?</strong> Leave it blank and the entry is purely yours. Name someone and you pick how:</p><ul><li><strong>They owe me for it</strong> — you covered something for them, whether it's their share of a bill or a straight loan of your money. Enter how much they owe; the rest stays your spending.</li><li><strong>It's their money</strong> — you're spending or handing back money that was never yours. None of it counts as your spending.</li><li><strong>I'm paying them back</strong> — your money settling something they covered for you. This <em>does</em> count as your spending, just late.</li><li><strong>They're paying me back</strong> (on income) — clears what they owed. Not your income.</li><li><strong>It's their money</strong> (on income) — you're holding it for them, so you owe them.</li></ul><p>An <strong>IOU</strong> never appears on Track, by design — no money left your accounts, so there's no transaction to show. It lives on People until real money moves.</p><p>The <strong>People</strong> tab adds all of this up into one running balance per person. Tap someone to see every entry behind their number.</p>" + '</div>', { collapsible: true, key: "help-lend" });
    body += card("Settling up &amp; IOUs", "Paying back, treats, and money that isn't yours", '<div class="help-b">' + "<p><strong>Settle up</strong> on the People tab handles the ending.</p><ul><li><strong>They paid me / I paid them</strong> — logs a real entry that draws the balance toward zero.</li><li><strong>Let it go</strong> — you forgive what they owed. That money truly left you, so it becomes your spending (a treat you gave).</li><li><strong>They shouldered it</strong> — they covered you for good. Nothing ever left your accounts, so nothing is counted.</li><li><strong>I kept it</strong> — they told you to keep their money, so it becomes your income.</li></ul><p>Every option takes an <strong>amount</strong> and a date, so you can settle just part of what's owed and leave the rest. Each entry in a person's history also has its own small <strong>Settle</strong> button, which fills in that item's amount \u2014 handy when someone owes you for two separate things and you only want to close one.</p><p><strong>Fronted, then treated them anyway?</strong> Log the entry at its real full amount, name them as <strong>they owe me</strong> for their share, then later hit <strong>Let it go</strong>. You keep the whole story, and the forgiven share correctly lands back in your own spending.</p><p><strong>IOUs.</strong> If a friend pays the merchant for your share, no money leaves your accounts — so there's no entry to name them on. That's the one case for a standalone <strong>IOU</strong> on the People tab. Pay it back later and the balance clears.</p><p><strong>Flat entry, or name someone?</strong> Both give the same balances and the same stats, so it comes down to what you want the ledger to show. The question: <em>could one half happen and the other fail, or be forgotten?</em> If it completes as a single exchange, log it flat. If the two halves are separate acts — you fronted something, or you're holding their money until you can pass it on — name them, so the debt stays visible for its whole life. It isn't about elapsed minutes, it's about exposure: did you have to remember anything afterwards?</p><p><strong>Money that's just passing through.</strong> Only what sticks to you counts. Acting as a human ATM (someone hands you cash as you send them the same amount) is a <strong>transfer</strong>, not a debt — nothing is owed once it's done. A fee is yours only when it leaves your account; a commission you earn is income. And if someone's money lands in one account but you spend it from another, name them on those entries as <strong>their money</strong> — your balances stay right and your stats stay clean.</p>" + '</div>', { collapsible: true, key: "help-passthrough" });
    body += card("Privacy mode", "Hide your amounts", '<div class="help-b">' + "<p>The <strong>eye</strong> button up top hides your amounts — for when someone's looking over your shoulder. <strong>Partial</strong> hides the revealing totals (net worth, balances, summaries) but keeps line items visible, so the app stays usable. <strong>Full</strong> hides every amount and the chart.</p><p>Either way, colors go neutral so nothing leaks whether you're up or down. Your numbers aren't gone — just masked on screen.</p>" + '</div>', { collapsible: true, key: "help-priv" });
    body += card("Backup &amp; installing", "Keep your data safe", '<div class="help-b">' + "<p>Because your data lives only in this browser, it's worth backing up. In <strong>Settings</strong> you can download everything as a file, and restore from one later or on another device.</p><p>You can also install Ledger as an app — Add to Home Screen on mobile, or the install icon in your browser's address bar — so it opens full-screen and works offline.</p>" + '</div>', { collapsible: true, key: "help-backup" });
    body += card("FAQ", "Common questions", '<div class="help-b">' + "<p><strong>Is my data sent anywhere?</strong><br>No. It's stored on your device and never leaves it — no accounts, no servers.</p><p><strong>What if I clear my browser data?</strong><br>That would erase your ledger, so keep a backup from Settings.</p><p><strong>Why doesn't a bill I paid still show in Upcoming?</strong><br>Once you log it for the month it's handled, and rolls to next month's date.</p><p><strong>Can I track a foreign-priced subscription?</strong><br>Use a variable-amount template and log the actual amount your account was charged, in your own currency.</p><p><strong>Can I fix a mistake?</strong><br>Every row has a pencil to edit and a trash to delete, and an Undo appears right after any change.</p>" + '</div>', { collapsible: true, key: "help-faq" });
    body += card("Quick reference", "At a glance", '<div class="help-b">' + "<ul><li><strong>+</strong> — quick-add an entry from any screen (bottom-right on mobile)</li><li><strong>eye</strong> — toggle privacy mode</li><li><strong>?</strong> — this help</li><li><strong>gear</strong> — settings, currency, backup</li><li><strong>pencil</strong> on a row to edit, <strong>trash</strong> to delete</li><li><strong>Undo</strong> — appears briefly after any change</li><li>tap a card's title to collapse or expand it</li></ul>" + '</div>', { collapsible: true, key: "help-ref" });
    body += card("About", "Ledger", '<div class="help-b">' + "<p>A small, private, offline-friendly money tracker. It runs entirely in your browser — no accounts, no tracking, nothing leaves your device.</p><p><strong>Recently added:</strong> a Trends time-period selector with net-worth and per-account history charts, spending projections, privacy mode, and variable-amount templates.</p>" + '</div>', { collapsible: true, key: "help-about" });
    app.innerHTML = layout(hero, sidebar, body);
  }
  // ---------- SYNC: status, diff, conflict, settings ----------
  var syncBusy = false, syncState = "idle";   // idle | busy | ok | dirty | conflict | error
  var syncMsg = "";
  var SYNC_ICON = { idle: "cloud-check", busy: "sync", ok: "cloud-check", dirty: "cloud-arrow-up", conflict: "cloud-warning", error: "cloud-warning" };

  function renderSyncBtn() {
    var b = document.getElementById("syncBtn"); if (!b) return;
    if (!state.sync || !state.sync.enabled || !syncOn()) { b.hidden = true; b.classList.remove("spin", "warn"); return; }
    b.hidden = false;
    var st = syncBusy ? "busy" : (syncState === "conflict" ? "conflict" : syncState === "error" ? "error" : (state.sync.dirty ? "dirty" : "ok"));
    b.querySelector("use").setAttribute("href", "#ph-" + SYNC_ICON[st]);
    b.classList.toggle("spin", st === "busy");
    b.classList.toggle("warn", st === "conflict" || st === "error");
    var label = { busy: "Syncing\u2026", ok: "Synced" + (state.sync.at ? " \u00b7 " + relTime(state.sync.at) : ""), dirty: "Unsynced changes \u2014 tap to sync", conflict: "Sync conflict \u2014 tap to resolve", error: syncMsg || "Sync error" }[st];
    b.setAttribute("aria-label", label); b.setAttribute("title", label);
  }
  function relTime(ms) {
    var d = Math.round((Date.now() - ms) / 1000);
    if (d < 60) return "just now";
    if (d < 3600) return Math.round(d / 60) + "m ago";
    if (d < 86400) return Math.round(d / 3600) + "h ago";
    return Math.round(d / 86400) + "d ago";
  }
  function syncErrText(e) {
    return { BAD_TOKEN: "That token was rejected. Check it hasn\u2019t expired.", NO_REPO: "Repo not found \u2014 check the owner/name.",
      NO_WRITE: "That token can\u2019t write to the repo.", BAD_PASSPHRASE: "Wrong passphrase \u2014 the stored copy won\u2019t open with it.",
      BAD_FORMAT: "That file isn\u2019t a Ledger sync file.", NEWER_FORMAT: "The stored copy was written by a newer version of Ledger.",
      BAD_DATA: "The stored copy couldn\u2019t be read." }[e.message] || ("Sync failed (" + e.message + ")");
  }

  async function doSync(silent) {
    if (!syncOn() || syncBusy) return;
    syncBusy = true; syncState = "busy"; renderSyncBtn();
    try {
      var r = await syncAuto();
      if (r.action === "conflict") { syncState = "conflict"; if (!silent) openConflict(); else toast("Sync conflict \u2014 tap the cloud to resolve"); }
      else { syncState = "ok"; syncMsg = ""; if (!silent && r.action !== "current") toast(r.action === "pulled" ? "Pulled from " + (r.from || "the other device") : "Pushed"); }
    } catch (e) { syncState = "error"; syncMsg = syncErrText(e); if (!silent) toast(syncMsg); }
    syncBusy = false; renderSyncBtn();
    render();   /* a pull changes the data — the current tab must show it, not just Settings */
  }

  /* Conflict: never guess. Show WHAT differs, then let the user choose. */
  function backupCounts(o) {
    return { tx: (o.transactions || []).length, accounts: (o.accounts || []).length, loans: (o.loans || []).length,
             recurring: (o.recurring || []).length, goals: (o.goals || []).length, ious: (o.ious || []).length };
  }
  function diffBackups(mine, theirs) {
    var out = { onlyMine: 0, onlyTheirs: 0, changed: 0, lists: { onlyMine: [], onlyTheirs: [] } };
    ["transactions", "loans", "ious", "goals", "recurring", "accounts"].forEach(function (k) {
      var a = {}, b = {};
      (mine[k] || []).forEach(function (x) { a[x.id] = JSON.stringify(x); });
      (theirs[k] || []).forEach(function (x) { b[x.id] = JSON.stringify(x); });
      Object.keys(a).forEach(function (id) {
        if (!(id in b)) { out.onlyMine++; if (k === "transactions" && out.lists.onlyMine.length < 4) out.lists.onlyMine.push(txLabel(mine[k], id)); }
        else if (a[id] !== b[id]) out.changed++;
      });
      Object.keys(b).forEach(function (id) {
        if (!(id in a)) { out.onlyTheirs++; if (k === "transactions" && out.lists.onlyTheirs.length < 4) out.lists.onlyTheirs.push(txLabel(theirs[k], id)); }
      });
    });
    return out;
  }
  function txLabel(list, id) {
    var t = list.filter(function (x) { return x.id === id; })[0];
    if (!t) return "";
    return (t.where || t.type || "entry") + " \u00b7 " + fmtBig(t.amount || 0) + " \u00b7 " + fmtDate(t.date || "");
  }

  /* A merge that is honest about what it can and can't do:
     - a record on only ONE side  -> keep it (this is the common case: you added on both)
     - a record on BOTH, identical -> keep it
     - a record on BOTH, different -> we cannot know which edit is newer (we only store
       `created`), so the user picks which side wins for those, and we say how many there are. */
  function mergeBackups(mine, theirs, prefer) {
    var out = { app: "ledger", version: 9, exportedAt: new Date().toISOString(), currency: mine.currency || theirs.currency };
    var stats = { added: 0, kept: 0, clashed: 0 };
    ["accounts", "transactions", "loans", "recurring", "goals", "ious"].forEach(function (k) {
      var byId = {}, order = [];
      function put(x, side) {
        if (!x || !x.id) return;
        if (!(x.id in byId)) { byId[x.id] = { v: x, side: side }; order.push(x.id); return; }
        var cur = byId[x.id];
        if (JSON.stringify(cur.v) === JSON.stringify(x)) return;      /* identical */
        stats.clashed++;
        if (prefer === "theirs" && side === "theirs") byId[x.id] = { v: x, side: side };
        if (prefer === "mine" && side === "mine") byId[x.id] = { v: x, side: side };
      }
      (mine[k] || []).forEach(function (x) { put(x, "mine"); });
      var before = order.length;
      (theirs[k] || []).forEach(function (x) { put(x, "theirs"); });
      stats.added += order.length - before;
      stats.kept += order.length;
      out[k === "transactions" ? "transactions" : k] = order.map(function (id) { return byId[id].v; });
    });
    out.transactions = out.transactions || [];
    return { data: out, stats: stats };
  }

  async function openConflict() {
    var body = '<p class="help-p">This device and the cloud copy have <strong>both</strong> changed. <strong>Nothing has been overwritten.</strong> Comparing them\u2026</p><div class="empty">Comparing\u2026</div>';
    openModal("Sync conflict", body, "", null, { hideOk: true });
    var mine, theirs, remoteMeta;
    try {
      var got = await backend().pull();
      var opened = await openBlob(got.blob, state.sync.pass);
      mine = JSON.parse(backupText()); theirs = JSON.parse(opened.text);
      remoteMeta = opened;
    } catch (e) { document.querySelector("#modal .modal-b").innerHTML = '<div class="empty">' + esc(syncErrText(e)) + '</div>'; return; }
    var d = diffBackups(mine, theirs), mc = backupCounts(mine), tc = backupCounts(theirs);
    var side = function (title, sub, c, only, list) {
      return '<div class="cf-side"><div class="cf-h">' + title + '</div><div class="cf-sub">' + sub + '</div>'
        + '<div class="cf-n num">' + c.tx + ' entries \u00b7 ' + c.accounts + ' accounts</div>'
        + (only ? '<div class="cf-only">' + only + ' not on the other side</div>' : '<div class="cf-only cf-none">nothing unique</div>')
        + (list.length ? '<ul class="cf-list">' + list.map(function (x) { return "<li>" + esc(x) + "</li>"; }).join("") + '</ul>' : "")
        + '</div>';
    };
    var html = '<p class="help-p">This device and the cloud copy have <strong>both</strong> changed. <strong>Nothing has been overwritten.</strong></p>'
      + '<div class="cf-grid">'
      + side("This device", esc(state.sync.device || "here"), mc, d.onlyMine, d.lists.onlyMine)
      + side("The cloud copy", "last saved by " + esc(remoteMeta.device || "another device") + (remoteMeta.at ? " \u00b7 " + relTime(Date.parse(remoteMeta.at)) : ""), tc, d.onlyTheirs, d.lists.onlyTheirs)
      + '</div>'
      + (d.changed ? '<div class="hint">' + d.changed + ' record' + (d.changed === 1 ? "" : "s") + ' exist' + (d.changed === 1 ? "s" : "") + ' on both sides but differ \u2014 merging can\u2019t tell which edit is newer, so it keeps this device\u2019s version of those.</div>' : "")
      + '<div class="vstack" style="margin-top:var(--s-3)">'
      + '<button class="btn" id="cfMerge">' + icon("sync") + 'Merge \u2014 keep everything from both</button>'
      + '<button class="btn sec" id="cfBackup">' + icon("download-simple") + 'Download a backup of this device first</button>'
      + '<div class="data-btns"><button class="btn sec" id="cfMine">Keep only this device</button><button class="btn sec" id="cfTheirs">Keep only the cloud copy</button></div>'
      + '</div>';
    document.querySelector("#modal .modal-b").innerHTML = html;

    bind("cfMerge", "click", function () {

        syncBusy = true; renderSyncBtn();
        try {
          applyBackup(m.data);
          await syncPush(true);           /* push the merged result over the top */
          syncState = "ok"; toast("Merged \u2014 both devices now match");
        } catch (e) { syncState = "error"; toast(syncErrText(e)); }
        syncBusy = false; renderSyncBtn(); render();
      });
    });
    bind("cfMine", "click", function () {
      closeModal();
      confirmModal("Keep only this device?", "The cloud copy will be replaced by this device\u2019s data. Anything only in the cloud is lost.", "Keep this device", async function () {
        syncBusy = true; renderSyncBtn();
        try { await syncPush(true); syncState = "ok"; toast("Cloud copy replaced"); }
        catch (e) { syncState = "error"; toast(syncErrText(e)); }

    });
    bind("cfTheirs", "click", function () {
      closeModal();
      confirmModal("Keep only the cloud copy?", "This device\u2019s data will be replaced by the cloud copy. Anything only here is lost.", "Keep the cloud copy", async function () {
        syncBusy = true; renderSyncBtn();
        try { await syncPull(true); syncState = "ok"; toast("This device now matches the cloud"); }
        catch (e) { syncState = "error"; toast(syncErrText(e)); }

  }

  var PW_WORDS = ["amber","anchor","basil","breeze","cactus","candle","cedar","cobalt","copper","coral","cotton","crimson","daisy","dune","ember","fable","falcon","fern","garnet","ginger","harbor","hazel","indigo","ivory","jasper","juniper","kite","lantern","linen","lotus","maple","marble","meadow","nectar","nutmeg","olive","onyx","orchid","pebble","pepper","quartz","quill","raven","ribbon","saffron","sage","silver","spruce","thistle","timber","topaz","tulip","velvet","walnut","willow","zephyr"];
