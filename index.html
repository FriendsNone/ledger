<!DOCTYPE html>
<html lang="en">
<head>
<!-- Ledger — warm, utilitarian money tracker · v7 (custom settle + edit) -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ledger</title>
<meta name="theme-color" content="#f4f1ea">
<meta name="description" content="A quiet place to watch your money.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ledger">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f4f1ea; --paper-2: #ebe6db; --card: #fbfaf6;
    --ink: #221f1a; --ink-soft: #6b6457; --ink-faint: #736b5a;
    --line: #ddd6c7; --line-strong: #cfc6b3;
    --income: #2f6b4f; --income-soft: #e4efe7;
    --expense: #a8442b; --expense-soft: #f5e4dd;
    --amber: #8a6410; --amber-soft: #f6ecd5;
    --accent: #1a1814; --accent-ink: #f4f1ea; --on-fill: #fff;
    --rule: rgba(168,158,138,.10);
    --shadow: 0 1px 2px rgba(40,34,22,.05), 0 8px 24px rgba(40,34,22,.06);
    --radius: 14px;
  }
  [data-theme="dark"] {
    --paper: #17150f; --paper-2: #221f18; --card: #1f1c15;
    --ink: #ece6d8; --ink-soft: #a89f8a; --ink-faint: #8f876f;
    --line: #2e2a20; --line-strong: #403a2d;
    --income: #6cc18f; --income-soft: #1d2f23;
    --expense: #e08566; --expense-soft: #361f17;
    --amber: #d9aa46; --amber-soft: #2e2613;
    --accent: #ece6d8; --accent-ink: #17150f; --on-fill: #17150f;
    --rule: rgba(120,112,92,.10);
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 28px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Hanken Grotesk', sans-serif; background: var(--paper);
    background-image: repeating-linear-gradient(transparent, transparent 31px, var(--rule) 31px, var(--rule) 32px);
    color: var(--ink); -webkit-font-smoothing: antialiased; line-height: 1.45;
    padding: 26px 18px 70px; transition: background-color .25s, color .25s; overflow-x: hidden;
  }
  .wrap { max-width: 940px; margin: 0 auto; }
  .num { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; letter-spacing: -.02em; }
  .pos { color: var(--income); } .neg { color: var(--expense); } .neu { color: var(--ink-soft); }

  header { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
  .brand { display: flex; align-items: center; gap: 11px; }
  .mark { width: 38px; height: 38px; border-radius: 9px; flex: none; background: var(--accent); color: var(--accent-ink); display: grid; place-items: center; font-family: 'Fraunces', serif; font-weight: 600; font-size: 22px; }
  .brand h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 26px; letter-spacing: -.01em; }
  .brand p { color: var(--ink-soft); font-size: 12.5px; margin-top: -2px; }
  .tools { display: flex; align-items: center; gap: 8px; }
  .icon-btn { font-family: 'JetBrains Mono', monospace; color: var(--ink); border: 1px solid var(--line-strong); background: var(--card); border-radius: 9px; padding: 8px; cursor: pointer; transition: .15s; display: inline-flex; align-items: center; justify-content: center; }
  .icon-btn:hover { border-color: var(--ink-soft); }
  .icon-btn.on { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

  nav.tabs { display: flex; gap: 4px; background: var(--paper-2); padding: 4px; border-radius: 11px; margin-bottom: 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  nav.tabs button { flex: 1; min-width: max-content; border: 0; background: transparent; padding: 9px 14px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600; color: var(--ink-soft); transition: .15s; white-space: nowrap; }
  nav.tabs button.on { background: var(--card); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.06); }

  .hero { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--shadow); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
  .hero .label { font-size: 11px; text-transform: uppercase; letter-spacing: .14em; color: var(--ink-faint); margin-bottom: 6px; }
  .hero .balance { font-size: 42px; font-weight: 600; line-height: 1; }
  .hero .csub { font-size: 13px; color: var(--ink-soft); margin-top: 8px; }
  .pills { display: flex; gap: 22px; flex-wrap: wrap; }
  .pill .label { font-size: 11px; } .pill .v { font-size: 20px; font-weight: 600; }

  .cols { display: grid; grid-template-columns: 360px 1fr; gap: 16px; align-items: start; }
  .cols > div { min-width: 0; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  @media (max-width: 780px) { .cols { grid-template-columns: 1fr; } }
  @media (min-width: 781px) { .cols > div:first-child { position: sticky; top: 16px; max-height: calc(100vh - 32px); overflow-y: auto; overflow-x: hidden; } }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
  .card-h { padding: 15px 18px 0; }
  .card-h h2 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 17px; }
  .card-h .sub { font-size: 12px; color: var(--ink-faint); }
  .card-h.ch { display: flex; justify-content: space-between; align-items: center; gap: 10px; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .card-h.ch:hover .chev { color: var(--ink); }
  .chev { font-family: 'JetBrains Mono', monospace; font-size: 17px; line-height: 1; color: var(--ink-faint); transition: transform .25s ease; flex: none; }
  .card.collapsed .chev { transform: rotate(-90deg); }
  .cwrap { display: grid; grid-template-rows: 1fr; }
  .card.collapsible .cwrap { transition: grid-template-rows .3s ease; }
  .card-h.ch { transition: padding .3s ease; }
  .card.collapsible .cwrap > .card-b { overflow: hidden; min-height: 0; transition: opacity .2s ease, padding .3s ease; }
  .card.collapsed .cwrap { grid-template-rows: 0fr; }
  .card.collapsed .cwrap > .card-b { opacity: 0; padding-top: 0; padding-bottom: 0; }
  .card.collapsed > .card-h.ch { padding-bottom: 15px; }
  .card-b { padding: 16px 18px 18px; }

  .seg { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; background: var(--paper-2); padding: 4px; border-radius: 10px; margin-bottom: 14px; }
  .seg.three { grid-template-columns: 1fr 1fr 1fr; }
  .seg button { border: 0; background: transparent; padding: 9px 4px; border-radius: 7px; cursor: pointer; font-family: inherit; font-size: 13.5px; font-weight: 600; color: var(--ink-soft); transition: .15s; }
  .seg button.on[data-t="expense"], .seg button.on[data-rt="expense"], .seg button.on[data-et="expense"], .seg button.on[data-lk="lent-out"] { background: var(--expense); color: var(--on-fill); }
  .seg button.on[data-t="income"], .seg button.on[data-rt="income"], .seg button.on[data-et="income"], .seg button.on[data-lk="borrowed"] { background: var(--income); color: var(--on-fill); }
  .seg button.on[data-t="transfer"], .seg button.on[data-rt="transfer"], .seg button.on[data-et="transfer"], .seg button.on[data-theme-set], .seg button.on[data-priv-set] { background: var(--accent); color: var(--accent-ink); }
  .priv-full .balance.pos, .priv-full .balance.neg, .priv-full .v.pos, .priv-full .v.neg, .priv-full .v.neu { color: var(--ink); }
  .priv-full .badge.gain, .priv-full .badge.loss { background: var(--paper-2); color: var(--ink-soft); }
  .priv-partial .balance.pos, .priv-partial .balance.neg, .priv-partial .pill .v.pos, .priv-partial .pill .v.neg, .priv-partial .stat .v.pos, .priv-partial .stat .v.neg { color: var(--ink); }

  label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-soft); margin: 0 0 5px 2px; }
  .field { margin-bottom: 12px; min-width: 0; }
  .opt { font-weight: 400; color: var(--ink-faint); }
  input, select.inp { width: 100%; min-width: 0; font-family: inherit; font-size: 15px; color: var(--ink); background: var(--paper); border: 1px solid var(--line-strong); border-radius: 9px; padding: 10px 12px; transition: border-color .15s, box-shadow .15s; }
  input:focus, select.inp:focus { outline: 0; border-color: var(--ink-soft); box-shadow: 0 0 0 3px rgba(120,110,90,.14); }
  .amount-wrap { position: relative; }
  input.invalid, select.invalid { border-color: var(--expense) !important; box-shadow: 0 0 0 3px rgba(190,70,55,.16); animation: shake .28s; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-4px); } 40%,80% { transform: translateX(4px); } }
  .amount-wrap .sym { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--ink-faint); font-family: 'JetBrains Mono', monospace; font-size: 15px; }
  .amount-wrap input { padding-left: 32px; font-family: 'JetBrains Mono', monospace; }
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .hint { font-size: 11.5px; color: var(--ink-faint); margin: -7px 0 12px 2px; }
  .btn { width: 100%; border: 0; border-radius: 10px; padding: 12px; cursor: pointer; font-family: inherit; font-size: 15px; font-weight: 700; color: var(--accent-ink); background: var(--accent); transition: transform .08s, opacity .15s; }
  .fab { position: fixed; right: 16px; bottom: 16px; width: 56px; height: 56px; border-radius: 50%; border: 0; cursor: pointer; color: var(--accent-ink); background: var(--accent); display: none; align-items: center; justify-content: center; box-shadow: 0 3px 12px rgba(0,0,0,.2); z-index: 40; }
  .fab .ic { width: 26px; height: 26px; }
  .fab:active { transform: scale(.94); }
  @media (max-width: 780px) {
    .fab { display: flex; bottom: calc(66px + env(safe-area-inset-bottom, 0px)); }
    nav.tabs { position: fixed; left: 0; right: 0; bottom: 0; z-index: 30; margin: 0; border-radius: 0; border-top: 1px solid var(--line); padding: 5px 8px calc(5px + env(safe-area-inset-bottom, 0px)); scrollbar-width: none; }
    nav.tabs::-webkit-scrollbar { display: none; }
    body { padding-bottom: calc(66px + env(safe-area-inset-bottom, 0px)); }
  }
  .btn:hover { opacity: .92; } .btn:active { transform: scale(.985); }
  .btn.sec { background: var(--paper-2); color: var(--ink); }
  .btn-sm { width: auto; padding: 7px 12px; font-size: 13px; border-radius: 8px; }
  .data-btns { display: flex; flex-direction: column; gap: 8px; }
  .row-gap { display: flex; gap: 10px; flex-wrap: wrap; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { border: 1px solid var(--line-strong); background: var(--paper); color: var(--ink); border-radius: 999px; padding: 7px 13px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; gap: 7px; align-items: center; transition: .15s; max-width: 100%; }
  .chip:hover { border-color: var(--ink-soft); }
  .chip .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 170px; }
  .chip .amt { font-family: 'JetBrains Mono', monospace; font-weight: 600; flex: none; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .filters > input { flex: 1 1 140px; }
  .filters > select { flex: 0 1 auto; width: auto; }
  .filters select, .filters input { font-family: inherit; font-size: 13px; color: var(--ink); background: var(--paper); border: 1px solid var(--line-strong); border-radius: 8px; padding: 7px 9px; cursor: pointer; }
  .filters input { cursor: text; width: 120px; }

  .bd-row { display: grid; grid-template-columns: 110px 1fr auto; align-items: center; gap: 10px; margin-bottom: 9px; }
  .bd-row .cat { font-size: 13px; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar { height: 9px; border-radius: 5px; background: var(--paper-2); overflow: hidden; }
  .bar > span { display: block; height: 100%; border-radius: 5px; background: var(--expense); transition: width .4s ease; }
  .bd-row .amt { font-size: 13px; font-weight: 600; }

  .lrow { display: flex; flex-wrap: wrap; align-items: center; gap: 6px 12px; padding: 11px 2px; border-bottom: 1px solid var(--line); }
  .lrow:last-child { border-bottom: 0; }
  .lrow.is-settled .lead { opacity: .5; }
  .lrow.is-settled .t { color: var(--ink-soft); }
  .lead { flex: none; display: flex; align-items: center; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .dot.ring { background: transparent !important; border: 2px solid var(--ink-faint); width: 10px; height: 10px; }
  .body { flex: 1 1 150px; min-width: 0; }
  .body .t { font-size: 14px; font-weight: 600; overflow-wrap: anywhere; }
  .body .t.num { font-family: 'JetBrains Mono', monospace; }
  .body .s { font-size: 12px; color: var(--ink-faint); margin-top: 2px; display: flex; flex-wrap: wrap; align-items: center; gap: 3px 8px; overflow-wrap: anywhere; }
  .end { flex: none; margin-left: auto; display: flex; align-items: center; flex-wrap: wrap; justify-content: flex-end; gap: 6px; }
  .end .v { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; letter-spacing: -.02em; font-size: 15px; font-weight: 600; white-space: nowrap; }
  .act { border: 1px solid var(--line-strong); background: var(--paper); color: var(--ink); border-radius: 7px; padding: 6px 11px; font-family: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer; transition: .15s; white-space: nowrap; }
  .act:hover { border-color: var(--ink-soft); }
  .act.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .del, .mini { border: 0; background: transparent; color: var(--ink-faint); cursor: pointer; line-height: 0; padding: 0; width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; border-radius: 7px; transition: .15s; }
  .del:hover { background: var(--expense-soft); color: var(--expense); }
  .mini:hover { background: var(--paper-2); color: var(--ink); }
  .more { text-align: center; margin-top: 10px; }

  .snap-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--line); }
  .snap-row:last-child { border-bottom: 0; }
  .snap-row .nm { flex: 1; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .snap-row .bl { font-size: 14px; font-weight: 600; }

  .badge { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 999px; white-space: nowrap; }
  .badge.gain { background: var(--income-soft); color: var(--income); }
  .badge.loss { background: var(--expense-soft); color: var(--expense); }
  #modal { display: none; }
  .modal-bg { position: fixed; inset: 0; background: rgba(20,16,10,.45); display: flex; align-items: center; justify-content: center; padding: 18px; z-index: 100; }
  .modal { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: 0 24px 64px rgba(40,34,22,.30); width: 100%; max-width: 420px; max-height: calc(100vh - 36px); overflow-y: auto; padding: 20px 20px 18px; }
  .modal h3 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px; }
  .modal-h { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
  .modal-x { border: 0; background: transparent; color: var(--ink-faint); cursor: pointer; width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; border-radius: 7px; flex: none; }
  .modal-x:hover { background: rgba(0,0,0,.07); color: var(--ink); }
  .modal-f { display: flex; gap: 10px; margin-top: 20px; }
  .modal-f .btn { width: auto; flex: 1; }
  .modal-msg { font-size: 14px; color: var(--ink-soft); line-height: 1.5; margin-bottom: 4px; }
  .btn.danger { background: var(--expense); color: #fff; }

  .nag { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; background: var(--amber-soft); border: 1px solid var(--line); border-radius: 11px; padding: 9px 8px 9px 13px; margin-bottom: 16px; font-size: 13px; color: var(--ink); animation: nagIn .26s ease; }
  .nag-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber); flex: none; }
  .nag-msg { flex: 1; min-width: 150px; }
  .nag-acts { display: flex; align-items: center; gap: 4px; }
  .nag .btn-sm { width: auto; }
  .nag-x { border: 0; background: transparent; color: var(--ink-faint); cursor: pointer; width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; border-radius: 7px; flex: none; }
  .nag-x:hover { background: rgba(0,0,0,.06); color: var(--ink); }
  .nag-x:hover { background: rgba(120,90,20,.12); color: var(--ink); }
  #backupNag:empty { display: none; }

  .day-div { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; padding: 14px 4px 6px; }
  .ic { width: 17px; height: 17px; fill: currentColor; flex: none; pointer-events: none; vertical-align: -3px; }
  .icon-btn .ic { width: 20px; height: 20px; vertical-align: middle; }
  .chev .ic { width: 18px; height: 18px; display: block; }
  .btn .ic { width: 17px; height: 17px; vertical-align: -3px; margin-right: 3px; }
  .nag-x .ic, .modal-x .ic, .toast-x .ic { width: 16px; height: 16px; vertical-align: middle; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
  .toast :focus-visible { outline-color: var(--accent-ink); outline-offset: 1px; }
  .modal-bg :focus-visible { outline-offset: 1px; }
  .list > .day-div:first-child { padding-top: 2px; }
  .day-date { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--ink-faint); }
  .day-net { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-variant-numeric: tabular-nums; }

  #settingsBtn { transition: border-color .15s, background .15s, color .15s; }
  @keyframes nagIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  @keyframes viewIn { from { opacity: 0; transform: translateY(-9px); } to { opacity: 1; transform: none; } }
  @keyframes softIn { from { opacity: .35; } to { opacity: 1; } }
  @keyframes modalIn { from { opacity: 0; transform: translateY(8px) scale(.985); } to { opacity: 1; transform: none; } }
  .view-enter > .hero { animation: viewIn .32s cubic-bezier(.2,.7,.3,1) both; }
  .view-enter > .cols { animation: softIn .34s ease both; }
  .modal-bg { animation: softIn .18s ease; }
  .modal { animation: modalIn .2s cubic-bezier(.2,.8,.2,1); }
  @media (prefers-reduced-motion: reduce) { .nag, .view-enter > .hero, .view-enter > .cols, .modal-bg, .modal, .chev, .cwrap { animation: none !important; transition: none !important; } }
  .badge.lent { background: var(--expense-soft); color: var(--expense); }
  .badge.borrowed { background: var(--income-soft); color: var(--income); }
  .badge.settled, .badge.shortcut { background: var(--paper-2); color: var(--ink-soft); }
  .badge.overdue { background: var(--expense-soft); color: var(--expense); }
  .badge.due { background: var(--amber-soft); color: var(--amber); }
  .badge.next { background: var(--paper-2); color: var(--ink-soft); }
  .day-date.pn { text-transform: none; font-size: 12px; letter-spacing: .01em; color: var(--ink-soft); }
  .pnet { font-size: 12px; font-weight: 600; }

  .legend { display: flex; gap: 16px; font-size: 12px; color: var(--ink-soft); margin-bottom: 10px; flex-wrap: wrap; }
  .legend i { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 6px; vertical-align: -1px; }
  .statcol { display: flex; flex-direction: column; gap: 10px; }
  .stat { background: var(--paper-2); border-radius: 10px; padding: 11px 13px; }
  .stat .l { font-size: 11px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .08em; }
  .stat .v { font-size: 18px; font-weight: 600; margin-top: 3px; }
  .stat .v.sm { font-size: 14px; }

  .empty { text-align: center; color: var(--ink-faint); padding: 26px 10px; font-size: 14px; }
  .empty .big { font-family: 'Fraunces', serif; font-size: 18px; color: var(--ink-soft); margin-bottom: 4px; }
  .nudge { text-align: center; padding: 18px 10px; }
  .loading { text-align: center; color: var(--ink-faint); padding: 50px; font-size: 14px; }
  .foot { text-align: center; color: var(--ink-faint); font-size: 12px; margin-top: 24px; }
  .foot button { background: none; border: 0; color: var(--ink-faint); text-decoration: underline; cursor: pointer; font-family: inherit; font-size: 12px; }
  .foot button:hover { color: var(--expense); }

  .toast { position: fixed; left: 50%; bottom: 26px; translate: -50% 20px; background: var(--accent); color: var(--accent-ink); padding: 10px 18px; border-radius: 999px; font-size: 14px; font-weight: 600; box-shadow: var(--shadow); opacity: 0; pointer-events: none; transition: .25s; z-index: 50; max-width: 90%; display: flex; align-items: center; gap: 14px; justify-content: center; }
  .toast.show { opacity: 1; translate: -50% 0; pointer-events: auto; }
